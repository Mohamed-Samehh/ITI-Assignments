<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>School System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        nav {
            background: #1f2937;
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            background: #374151;
            padding: 8px 12px;
            border-radius: 6px;
        }

        nav a:hover {
            background: #4b5563;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f3f4f6;
        }

        .actions a,
        .actions button {
            margin-right: 6px;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            text-decoration: none;
        }

        form.inline {
            display: inline;
        }
    </style>
</head>

<body>
    <nav>
        {% if user.is_authenticated %}
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'students' %}">Students</a>
        <a href="{% url 'subjects' %}">Subjects</a>
        <a href="{% url 'grades' %}">Grades</a>
        <a href="{% url 'user_profile' %}">UserProfile</a>
        <a href="{% url 'contact' %}">Contact</a>
        <a href="{% url 'logout' %}">Logout</a>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Register</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
