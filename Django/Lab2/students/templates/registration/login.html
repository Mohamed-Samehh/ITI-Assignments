{% extends 'students/base.html' %}
{% block content %}
<h2>Login</h2>
{% if form.errors %}
<p style="color: #b91c1c;">Invalid username or password.</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Login</button>
</form>
{% endblock %}
