{% extends 'students/base.html' %}
{% block content %}
<h2>{{ title }}</h2>
<form method="post">
    {% csrf_token %}
    <p>
        <label>Student:</label>
        <select name="student">
            {% for s in students_list %}
            <option value="{{ s.id }}" {% if grade.student_id == s.id %}selected{% endif %}>{{ s.id }} - {{ s.name }}
            </option>
            {% endfor %}
        </select>
    </p>
    <p>
        <label>Subject:</label>
        <select name="subject">
            {% for sub in subjects_list %}
            <option value="{{ sub.id }}" {% if grade.subject_id == sub.id %}selected{% endif %}>{{ sub.name }} ({{
                sub.code }})</option>
            {% endfor %}
        </select>
    </p>
    <p>
        <label>Score:</label>
        <input type="number" step="0.01" name="score" value="{{ grade.score }}">
    </p>
    <button class="btn" type="submit">Save</button>
</form>

{% if error %}
<p style="color: #b91c1c;">{{ error }}</p>
{% endif %}
{% endblock %}
